<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Dahab — Egyptian Gold{% endblock %}</title>
  <style>
    :root { --bg:#0f1115; --card:#1a1d24; --ink:#e8eaed; --muted:#9aa0a6; --gold:#d4af37; --line:#2a2e37; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--ink);
           font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 28px 16px 64px; }
    h1 { font-size: 1.4rem; margin: 0 0 4px; }
    .muted { color: var(--muted); font-size: .9rem; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
            padding:20px; margin-top:18px; }
    .price { font-size: 2.6rem; font-weight: 700; color: var(--gold); }
    table { width:100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align:left; padding:10px 8px; border-bottom:1px solid var(--line);
             font-variant-numeric: tabular-nums; }
    th { color: var(--muted); font-weight:600; font-size:.85rem; }
    .band { color: var(--muted); font-size:.85rem; }
    code { background:#0b0d11; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
